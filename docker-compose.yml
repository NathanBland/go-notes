services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: ["air", "-c", ".air.toml"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-go_notes}?sslmode=disable
      VALKEY_ADDR: valkey:6379
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-go_notes_session}
      SESSION_TTL: ${SESSION_TTL:-168h}
      OIDC_STATE_TTL: ${OIDC_STATE_TTL:-5m}
      NOTE_CACHE_TTL: ${NOTE_CACHE_TTL:-5m}
      LIST_CACHE_TTL: ${LIST_CACHE_TTL:-45s}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://localhost:8081/realms/go-notes}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-go-notes}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-replace-me}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-http://localhost:8080/api/v1/auth/callback}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid,profile,email}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-go_notes}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.19.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro

volumes:
  postgres_data:
  go_mod_cache:
  go_build_cache:
