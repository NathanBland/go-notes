services:
  api:
    image: ${GO_NOTES_IMAGE:-ghcr.io/nathanbland/go-notes:latest}
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      BASE_URL: ${BASE_URL:?set BASE_URL}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-go_notes}?sslmode=disable
      VALKEY_ADDR: valkey:6379
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-go_notes_session}
      SESSION_TTL: ${SESSION_TTL:-168h}
      OIDC_STATE_TTL: ${OIDC_STATE_TTL:-5m}
      NOTE_CACHE_TTL: ${NOTE_CACHE_TTL:-5m}
      LIST_CACHE_TTL: ${LIST_CACHE_TTL:-45s}
      THROTTLE_REQUESTS_PER_SECOND: ${THROTTLE_REQUESTS_PER_SECOND:-2}
      THROTTLE_BURST: ${THROTTLE_BURST:-5}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:?set OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?set OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:?set OIDC_REDIRECT_URL}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid,profile,email}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    ports:
      - "${PUBLIC_HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  migrate:
    image: ${GO_NOTES_IMAGE:-ghcr.io/nathanbland/go-notes:latest}
    restart: "no"
    command: ["migrate", "-path", "/app/migrations", "-database", "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-go_notes}?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-go_notes}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6

volumes:
  postgres_data:
  valkey_data:
