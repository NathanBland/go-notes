root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/api ./cmd/api"
entrypoint = "./tmp/api"
full_bin = "./tmp/api"
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "env"]
exclude_dir = [".git", ".cache", "tmp", "vendor"]
exclude_file = []
exclude_regex = ["_test\\.go"]
delay = 300
poll = true
poll_interval = 500
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true
